#cloud-config
autoinstall:
  version: 1

  # ── Locale & keyboard ────────────────────────────────────────────────────────
  locale: en_GB.UTF-8
  keyboard:
    layout: se

  # ── Network (DHCP — requires wired ethernet during install) ──────────────────
  network:
    version: 2
    ethernets:
      any:
        match:
          name: "en*"
        dhcp4: true

  # ── Storage (simple single partition, whole disk) ────────────────────────────
  storage:
    layout:
      name: direct

  # ── Primary user ─────────────────────────────────────────────────────────────
  identity:
    hostname: homelab
    username: axel
    # Password auth is disabled — SSH key only. This is a valid SHA-512 hash
    # of a placeholder value ('ubuntu'); it is never used to log in.
    # To generate your own: openssl passwd -6 'ubuntu'
    password: "$6$BNs0mqcbJ.UQEMxu$J4COn7WO8OHTI0QndyE2HsUBmfuRIcTa19cHYLeP1QT7Bujkk1pyMFfWDRzFSZSMZhZF7yqtt6OKo8LNex/zl."

  # ── SSH ───────────────────────────────────────────────────────────────────────
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPDeGSqnI7KQz5U5b9QiH3EZwOw2YEvsZDpOhyACOz+r homelab
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAZ3F0EBi3J2SVNEQToGaIh51r+uqbtU5u+0C0ljnKw2 axel@EST01110925-202603

  # ── Packages ──────────────────────────────────────────────────────────────────
  packages:
    - git
    - curl
    - wget
    - ansible
    - ca-certificates
    - gnupg
    # Docker itself is installed via its official apt repo in late-commands,
    # rather than the Ubuntu-packaged version which lags behind upstream.

  # ── Late commands (run after install, before first boot) ─────────────────────
  late-commands:

    # -- Remove snapd entirely --
    - curtin in-target --target=/target -- apt-get purge -y snapd
    - curtin in-target --target=/target -- apt-get autoremove -y --purge
    - rm -rf /target/snap /target/root/snap /target/home/axel/snap

    # -- Add Docker's official apt repository --
    - mkdir -p /target/etc/apt/keyrings
    - bash -c 'curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /target/etc/apt/keyrings/docker.gpg'
    - chmod a+r /target/etc/apt/keyrings/docker.gpg
    - bash -c 'echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" > /target/etc/apt/sources.list.d/docker.list'
    - curtin in-target --target=/target -- apt-get update
    - curtin in-target --target=/target -- apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

    # -- Add axel to the docker group (no sudo needed for docker commands) --
    - curtin in-target --target=/target -- usermod -aG docker axel

    # -- Enable Docker on boot --
    - curtin in-target --target=/target -- systemctl enable docker

    # -- SSH hardening (belt-and-suspenders alongside allow-pw: false above) --
    - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /target/etc/ssh/sshd_config
    - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /target/etc/ssh/sshd_config

    # -- Disable lid-close suspend (headless use with lid closed) --
    - sed -i 's/^#\?HandleLidSwitch=.*/HandleLidSwitch=ignore/' /target/etc/systemd/logind.conf
    - sed -i 's/^#\?HandleLidSwitchExternalPower=.*/HandleLidSwitchExternalPower=ignore/' /target/etc/systemd/logind.conf

  # ── Reboot automatically when done ───────────────────────────────────────────
  shutdown: reboot
