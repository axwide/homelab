services:
  nordvpn:
    build: ./nordvpn
    hostname: homelab  # stable meshnet hostname — changing this reassigns your meshnet name
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}
    volumes:
      - nordvpn_data:/var/lib/nordvpn
    ports:
      - 8096:8096        # jellyfin
      - 8080:8080        # qbittorrent webui
      - 6881:6881        # qbittorrent torrenting
      - 6881:6881/udp    # qbittorrent torrenting udp
      - 9696:9696        # prowlarr
      - 7878:7878        # radarr
      - 8989:8989        # sonarr
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    network_mode: service:nordvpn
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /home/axel/media/movies:/movies:ro
      - /home/axel/media/tv:/tv:ro
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:nordvpn
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - qbittorrent_config:/config
      - /home/axel/media:/data
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:nordvpn
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - prowlarr_config:/config
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:nordvpn
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - radarr_config:/config
      - /home/axel/media:/data
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:nordvpn
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - sonarr_config:/config
      - /home/axel/media:/data
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8
    container_name: recyclarr
    network_mode: service:nordvpn
    user: 1000:1000
    environment:
      - TZ=Europe/Amsterdam
      - CRON_SCHEDULE=@daily
    volumes:
      - ./recyclarr:/config
    restart: unless-stopped

volumes:
  nordvpn_data:
  jellyfin_config:
  jellyfin_cache:
  qbittorrent_config:
  prowlarr_config:
  radarr_config:
  sonarr_config:
