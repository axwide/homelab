services:
  nordvpn:
    build: ./nordvpn
    hostname: homelab  # stable meshnet hostname — changing this reassigns your meshnet name
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}
    volumes:
      - nordvpn_data:/var/lib/nordvpn
    restart: unless-stopped

volumes:
  nordvpn_data:
